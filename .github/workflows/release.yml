name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile ./MRNAP.psd1
          echo "version=$($manifest.ModuleVersion)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi

      - name: Upload module as release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          zip -j MRNAP-${TAG}.zip MRNAP.psm1 MRNAP.psd1 README.md LICENSE
          gh release upload "$TAG" MRNAP-${TAG}.zip --clobber

      - name: Publish to GitHub Packages (NuGet)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Write nuspec file
          cat > MRNAP.nuspec << NUSPEC
          <?xml version="1.0"?>
          <package>
            <metadata>
              <id>MRNAP</id>
              <version>${VERSION}</version>
              <authors>Dan Casmas</authors>
              <description>Generates a timestamped report file name and full path. Works on Windows, Linux, and macOS with PowerShell 5.1 and 7+.</description>
              <projectUrl>https://github.com/dcazman/MRNAP</projectUrl>
              <tags>PowerShell Report Filename Timestamp CrossPlatform</tags>
            </metadata>
            <files>
              <file src="MRNAP.psm1" target="" />
              <file src="MRNAP.psd1" target="" />
              <file src="README.md" target="" />
            </files>
          </package>
          NUSPEC

          # Install nuget CLI and pack
          wget -q https://dist.nuget.org/win-x86-commandline/latest/nuget.exe
          mono nuget.exe pack MRNAP.nuspec

          # Push to GitHub Packages
          dotnet nuget push "MRNAP.${VERSION}.nupkg" \
            --source "https://nuget.pkg.github.com/dcazman/index.json" \
            --api-key "${GITHUB_TOKEN}"
